<!DOCTYPE html>
<html>
    <head>
        <title>D.E.W Store</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../Assets/Images/raindrop.png" type="image/x-icon">
        <link rel="stylesheet" href="../Styles/LoginStyle.css" type="text/css">
        <link rel="stylesheet" href="../Styles/NavBarStyle.css" type="text/css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <script src="Javascript/mainScript.js" defer></script>
        <script src="Javascript/resetPasswordScript.js" defer></script>
    </head>

    <body>
        <header>
            <div>
                <img src="../Assets/Images/DEWLogo.png" alt="D.E.W Store Logo">
                <h1>D.E.W Store</h1>

            </div>

            <nav id="nav-links">

            </nav>

        </header>
        <div class="Login">
            <!-- Question 1a. Login Page: reset password form matched by TRN -->
            <form id="resetPasswordForm" onsubmit="resetPassword(event)">
                <h1>RESET PASSWORD</h1>

                <div class ="inputFields">
                    <div class="field">
                        <label>Tax Registration Number (TRN)</label>
                        <input type="text" id="trn" placeholder="000-000-000" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}" maxlength="11" required>

                    </div>

                    <div class="field">
                        <label>New Password</label>
                        <div class="password-container">
                            <input type="password" id="newPassword" placeholder="Enter your New Password" minlength="8" required>
                            <i class="material-icons" id="toggleNewPassword" style="cursor: pointer;">visibility</i>

                        </div>
                        <small class="passwordNote">Password must be at least 8 characters long.</small>

                    </div>

                    <div class="field">
                        <label>Confirm New Password</label>
                        <div class="password-container">
                            <input type="password" id="confirmNewPassword" placeholder="Confirm your New Password" minlength="8" required>
                            <i class="material-icons" id="toggleConfirmNewPassword" style="cursor: pointer;">visibility</i>

                        </div>
                        <small class="passwordNote">Password must be at least 8 characters long.</small>

                    </div>

                </div>

                <div class ="buttons">
                    <button type="submit">Reset Password</button>
                </div>

                <a class="formLink" href="index.html">Back to Login</a>

            </form>

            <div class="sideImage">
                <img src="../Assets/Images/COE33Cover.png" alt="COE 33 Image">
            </div>

        </div>

    </body>

</html>
