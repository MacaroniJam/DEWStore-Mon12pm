<!DOCTYPE html>
<html>

<head>
    <title>D.E.W Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Assets/Images/raindrop.png" type="image/x-icon">
    <link rel="stylesheet" href="../Styles/CheckoutStyle.css" type="text/css">
    <link rel="stylesheet" href="../Styles/NavBarStyle.css" type="text/css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="Javascript/mainScript.js" defer></script>
    <script src="Javascript/checkoutScript.js" defer></script>

</head>

<body>
    <header>
        <div>
            <img src="../Assets/Images/DEWLogo.png" alt="D.E.W Store Logo">
            <h1>D.E.W Store</h1>
        </div>

        <nav id="nav-links">

        </nav>

    </header>

    <main>
        <h1>CHECKOUT</h1>

        <section class="content">
            <section class="purchase pc-only">
                <h1>Payment Information</h1>
                <select id="paymentMethodDesktop">
                    <option value="" disabled selected>Select Payment Method</option>
                    <option value="creditCard">Credit Card</option>
                    <option value="debitCard">Debit Card</option>
                    <option value="paypal">PayPal</option>
                </select>
                
                <!-- CREDIT CARD FORM -->
                <form id="creditCardForm">
                    <h1>Credit Card Information</h1>
                    <div class="inputFields">
                        <div class="field">
                            <label>Full Name on Card</label>
                            <input type="text" id="creditCardName" placeholder="John Doe" required>
                        </div>
                                
                        <div class="field">
                            <label>Billing Address</label>
                            <input type="text" id="creditCardBillingAddress" placeholder="123 Main Street" required>
                        </div>

                        <div class="field">
                            <label>City</label>
                            <input type="text" id="creditCardCity" placeholder="New York" required>
                        </div>

                        <div class="field">
                            <label>Zip/Postal Code</label>
                            <input type="text" id="creditCardBillingZip" placeholder="10001" required>
                        </div>

                        <div class="field">
                            <label>TRN</label>
                            <input type="text" id="creditCardTRN" placeholder="123456789" required>
                        </div>
                        
                        <div class="field">
                            <label>Invoice Date</label>
                            <input type="text" id="creditCardInvoiceDate" placeholder="DD/MM/YYYY" required>
                        </div>

                        <div class="field">
                            <label>Invoice Number</label>
                            <input type="text" id="creditCardInvoiceNumber" placeholder="INV-001" required>
                        </div>

                        <div class="field">
                            <label>Payment Amount</label>
                            <input type="text" class="amountTotal" id="creditCardAmount" placeholder="Enter the amount to be paid" readonly>
                        </div>

                        <div class="field">
                            <label>Email Address</label>
                            <input type="email" id="creditCardEmail" placeholder="john.doe@example.com" required>
                        </div>
                    </div>
                </form>

                <!-- DEBIT CARD FORM -->
                <form id="debitCardForm" style="display: none;">
                    <h1>Debit Card Information</h1>
                    <div class="inputFields">
                        <div class="field">
                            <label>Full Name on Card</label>
                            <input type="text" id="debitCardName" placeholder="John Doe" required>
                        </div>
                                
                        <div class="field">
                            <label>Billing Address</label>
                            <input type="text" id="debitCardBillingAddress" placeholder="123 Main Street" required>
                        </div>

                        <div class="field">
                            <label>City</label>
                            <input type="text" id="debitCardCity" placeholder="New York" required>
                        </div>

                        <div class="field">
                            <label>Zip/Postal Code</label>
                            <input type="text" id="debitCardBillingZip" placeholder="10001" required>
                        </div>

                        <div class="field">
                            <label>TRN</label>
                            <input type="text" id="debitCardTRN" placeholder="123456789" required>
                        </div>
                        
                        <div class="field">
                            <label>Invoice Date</label>
                            <input type="text" id="debitCardInvoiceDate" placeholder="DD/MM/YYYY" required>
                        </div>

                        <div class="field">
                            <label>Invoice Number</label>
                            <input type="text" id="debitCardInvoiceNumber" placeholder="INV-001" required>
                        </div>

                        <div class="field">
                            <label>Payment Amount</label>
                            <input type="text" class="amountTotal" id="debitCardAmount" placeholder="Enter the amount to be paid" readonly>
                        </div>

                        <div class="field">
                            <label>Email Address</label>
                            <input type="email" id="debitCardEmail" placeholder="john.doe@example.com" required>
                        </div>
                    </div>
                </form>

                <!-- PAYPAL FORM -->
                <form id="paypalForm" style="display: none;">
                    <h1>PayPal Information</h1>
                    <div class="inputFields">
                        <div class="field">
                            <label>First Name</label>
                            <input type="text" id="paypalFname" placeholder="John" required>
                        </div>

                        <div class="field">
                            <label>Last Name</label>
                            <input type="text" id="paypalLname" placeholder="Doe" required>
                        </div>

                        <div class="field">
                            <label>Billing Address</label>
                            <input type="text" id="paypalAddress" placeholder="123 Main Street" required>
                        </div>

                        <div class="field">
                            <label>City</label>
                            <input type="text" id="paypalCity" placeholder="New York" required>
                        </div>

                        <div class="field">
                            <label>Zip/Postal Code</label>
                            <input type="text" id="paypalZip" placeholder="10001" required>
                        </div>

                        <div class="field">
                            <label>TRN</label>
                            <input type="text" id="paypalTRN" placeholder="123456789" required>
                        </div>

                        <div class="field">
                            <label>Invoice Date</label>
                            <input type="text" id="paypalInvoiceDate" placeholder="DD/MM/YYYY" required>
                        </div>

                        <div class="field">
                            <label>Invoice Number</label>
                            <input type="text" id="paypalInvoiceNumber" placeholder="INV-001" required>
                        </div>

                        <div class="field">
                            <label>PayPal Email</label>
                            <input type="email" id="paypalEmail" placeholder="john.doe@example.com" required>
                        </div>

                        <div class="field">
                            <label>Payment Amount</label>
                            <input type="text" class="amountTotal" id="paypalAmount" placeholder="Enter the amount to be paid" readonly>
                        </div>
                    </div>
                </form>
            </section>

            <section class="cart">
                <div class="cart-items">
                    <div id="cartContainer"></div>
                </div>

                <div class="order-summary">
                    <section class="purchase mobile-only">
                        <h1>Payment Information</h1>
                        <select id="paymentMethodMobile">
                            <option value="" disabled selected>Select Payment Method</option>
                            <option value="creditCard">Credit Card</option>
                            <option value="debitCard">Debit Card</option>
                            <option value="paypal">PayPal</option>
                        </select>
                    </section>
                    
                    <div class="order-total">
                        <h2>Total</h2>
                        <h2><span id="totalPrice">$0.00</span></h2>
                    </div>

                    <button id="placeOrder">Place Order</button>
                    <button id="cancelCheckout" class="cancel-btn">Cancel</button>
                </div>
            </section>
        </section>
    </main>

    <!-- Invoice Display Div -->
    <div id="invoiceDisplay" class="invoice-container" style="display: none;">
        <div class="invoice-content">
            <button id="closeInvoice" class="close-invoice">×</button>
            <div id="invoiceGenerated"></div>
        </div>
    </div>
        <!-- Container for email sent messages -->
    <div id="emailMessageContainer"></div>
</body>

</html>
