<!DOCTYPE html>
<html>

<head>
    <title>D.E.W Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Assets/Images/raindrop.png" type="image/x-icon">
    <link rel="stylesheet" href="../Styles/CheckoutStyle.css" type="text/css">
    <link rel="stylesheet" href="../Styles/NavBarStyle.css" type="text/css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="Javascript/mainScript.js" defer></script>
    <script src="Javascript/checkoutScript.js" defer></script>

</head>

<body>
    <header>
        <div>
            <img src="../Assets/Images/DEWLogo.png" alt="D.E.W Store Logo">
            <h1>D.E.W Store</h1>

        </div>

        <nav id="nav-links">

        </nav>


    </header>

    <main>
        <h1>CHECKOUT</h1>

        <section class=content>
            <section class="purchase pc-only" onchange="toggleForm()">
                <h1>Payment Information</h1>
                <select id="paymentMethodDesktop">
                    <option value="" disabled selected hidden>Select Payment Method</option>
                    <option value="debitCard">Debit Card</option>
                    <option value="creditCard">Credit Card</option>
                    <option value="paypal">PayPal</option>
                </select>
                
                <form id="creditCardForm"  style="display: none;">
                    <h1>Credit Card Information</h1>
                    <div class ="inputFields">
                        <div class="field">
                            <label>Name as on Card</label>
                            <input type="text" id="name" placeholder="Name as on Card" required>

                        </div>
                                
                        <div class="field">
                            <label>Card Billing Address</label>
                            <input type="text" id="cardBillingAddress" placeholder="Card Billing Address" required>

                        </div>

                         <div class="field">
                            <label>Card Billing Zip</label>
                            <input type="text" id="cardBillingZip" placeholder="Card Billing Zip" required>

                        </div>

                        <div class="field">
                            <label>Card Billing Number</label>
                            <input type="text" id="cardBillingNumber" placeholder="Card Billing Number" required>

                        </div>
                        
                        <div class="field">
                            <label>Card Expiration Date</label>
                            <input type="text" id="cardExpirationDate" placeholder="Card Expiration Date" required>

                        </div>

                        <div class="field">
                            <label>Payment Amount</label>
                            <input type="text" id="amountTotal" placeholder="Enter the amount to be paid" required>

                        </div>

                        <div class="field">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="Enter your Email" required>

                        </div>

                </form>

                <form id="debitCardForm"  style="display: none;">
                    <h1>Debit Card Information</h1>
                    <div class ="inputFields">
                        <div class="field">
                            <label>Name as on Card</label>
                            <input type="text" id="name" placeholder="Name as on Card" required>

                        </div>
                                
                        <div class="field">
                            <label>Card Billing Address</label>
                            <input type="text" id="cardBillingAddress" placeholder="Card Billing Address" required>

                        </div>

                         <div class="field">
                            <label>Card Billing Zip</label>
                            <input type="text" id="cardBillingZip" placeholder="Card Billing Zip" required>

                        </div>

                        <div class="field">
                            <label>Card Billing Number</label>
                            <input type="text" id="cardBillingNumber" placeholder="Card Billing Number" required>

                        </div>
                        
                        <div class="field">
                            <label>Card Expiration Date</label>
                            <input type="text" id="cardExpirationDate" placeholder="Card Expiration Date" required>

                        </div>

                        <div class="field">
                            <label>Payment Amount</label>
                            <input type="text" id="amountTotal" placeholder="Enter the amount to be paid" required>

                        </div>

                        <div class="field">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="Enter your Email" required>

                        </div>

                </form>

                <form id="paypalForm"  style="display: none;">
                    <h1>Credit Card Information</h1>
                    <div class ="inputFields">
                        <div class="field">
                            <label>First Name </label>
                            <input type="text" id="fname" placeholder="John" required>

                        </div>

                        <div class="field">
                            <label>Last Name </label>
                            <input type="text" id="lname" placeholder="Doe" required>

                        </div>

                        <div class="field">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="Enter your Email" required>

                        </div>

                        <div class="field">
                            <label>Payment Amount</label>
                            <input type="text" id="amountTotal" placeholder="Enter the amount to be paid" required>

                        </div>

                </form>
                

            </section>

            <section class="cart">
                <div class="cart-items">

                    <!-- Div for cart items to be populated by JavaScript -->
                    <div id="cartContainer"></div>




                </div>

                <div class="order-summary">
                    <!-- To move div position in mobile view by turning off the display of the pc only elements and turning on the mobile-only elements -->
                    <section class="purchase mobile-only">
                        <h1>Payment Information</h1>
                        <select id="paymentMethodMobile">
                            <option value="" disabled selected hidden>Select Payment Method</option>
                            <option value="debitCard">Debit Card</option>
                            <option value="creditCard">Credit Card</option>
                            <option value="paypal">PayPal</option>
                        </select>

                    </section>
                    <div class="order-total">
                        <h2>Total</h2>
                        <h2><span id="totalPrice">$0.00</span></h2>

                    </div>

                    <button id="placeOrder">Place Order</button>


                </div>

            </section>

        </section>




    </main>



</body>

</html>
