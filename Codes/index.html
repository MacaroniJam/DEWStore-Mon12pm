<!DOCTYPE html>
<html>
    <head>
        <title>D.E.W Store</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../Assets/Images/raindrop.png" type="image/x-icon">
        <link rel="stylesheet" href="../Styles/LoginStyle.css" type="text/css">
        <link rel="stylesheet" href="../Styles/NavBarStyle.css" type="text/css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <script src="Javascript/mainScript.js" defer></script>

        <script src="Javascript/indexScript.js" defer></script>
        
    </head>

    <body>
        <header>
            <div>
                <img src="../Assets/Images/DEWLogo.png" alt="D.E.W Store Logo">
                <h1>D.E.W Store</h1>

            </div>
            

            <nav id="nav-links">

            </nav>
            

        </header>
        <div class="Login">
            <form id="loginForm" onsubmit="login(event)">
                <h1>LOGIN</h1>

                <div class ="inputFields">
                    <div class="field">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter your Username" required>

                    </div>
                    
                    <div class="field">
                        <label >Password</label>
                        <div class="password-container">
                            <input type="password" id="password" placeholder="Enter your Password" required>
                            <i class="material-icons" id="togglePassword" style="cursor: pointer;">visibility</i>

                        </div>
                        

                    </div>

                    
                </div>

                <div class ="buttons">
                    <button type="submit">Login</button>
                    <button type="button" onclick="window.location.href='register.html'">Register</button>
                </div>

                
                
            </form>

            <div class="sideImage">
                <img src="../Assets/Images/COE33Cover.png" alt="COE 33 Image">
            </div>
            

        </div>


    </body>

</html>
