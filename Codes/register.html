<!DOCTYPE html>
<html>
    <head>
        <title>D.E.W Store</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../Assets/Images/raindrop.png" type="image/x-icon">
        <link rel="stylesheet" href="../Styles/RegisterStyle.css" type="text/css">
        <link rel="stylesheet" href="../Styles/NavBarStyle.css" type="text/css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <script src="Javascript/mainScript.js" defer></script>

        <script src="Javascript/registerScript.js" defer></script>
        
    </head>

    <body>
        <header>
            <div>
                <img src="../Assets/Images/DEWLogo.png" alt="D.E.W Store Logo">
                <h1>D.E.W Store</h1>

            </div>

            <nav id="nav-links">

            </nav>
            

        </header>
        <div class="Register">
            <!-- Question 1a. Registration Page: form for creating a new account -->
            <form id="registerForm" onsubmit="return validateForm(event);">
                <h1>REGISTER</h1>

                <div class ="inputFields">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" id="firstName" placeholder="Enter your First Name" required>

                    </div>

                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" id="lastName" placeholder="Enter your Last Name" required>

                    </div>

                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="date" id="dateOfBirth" required>

                    </div>

                    <div class="field">
                        <label>Gender</label>
                        <select id="gender" required>
                            <option value="">Select your Gender</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                            <option value="Other">Other</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>

                    </div>

                    <div class="field">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="Enter your Phone Number" required>

                    </div>
                    
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Enter your Email" required>

                    </div>

                    <div class="field">
                        <label>Tax Registration Number (TRN)</label>
                        <input type="text" id="trn" placeholder="000-000-000" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}" maxlength="11" required>

                    </div>
                    
                    <div class="field">
                        <label >Password</label>
                        <div class="password-container">
                            <input type="password" id="password" placeholder="Enter your Password" minlength="8" required>
                            <i class="material-icons" id="togglePassword" style="cursor: pointer;">visibility</i>

                        </div>
                        <small class="passwordNote">Password must be at least 8 characters long.</small>
                        

                    </div>

                    <div class="field">
                        <label >Confirm Password</label>
                        <div class="password-container">
                            <input type="password" id="confirmPassword" placeholder="Confirm your Password" minlength="8" required>
                            <i class="material-icons" id="toggleConfirmPassword" style="cursor: pointer;">visibility</i>

                        </div>
                        <small class="passwordNote">Password must be at least 8 characters long.</small>
                        

                    </div>

                    
                </div>

                <div class ="buttons">
                    <button type="submit" >Register</button>
                </div>

                
                
            </form>

            <div class="sideImage">
                <img src="../Assets/Images/COE33Cover.png" alt="COE 33 Image">
            </div>
            

        </div>


    </body>

</html>
